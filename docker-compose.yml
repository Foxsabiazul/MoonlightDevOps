services:
  database:
    image: mysql:lts
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD:
      MYSQL_DATABASE: moonlight
      MYSQL_USER: root
      MYSQL_PASSWORD: moonshinelightsky
    ports:
      - "3306:3306"

  backend:
    build:
      context: ./Moonlight_Backend
      dockerfile: Dockerfile
    container_name: backend_service
    restart: unless-stopped
    environment:
      DB_HOST: database
      DB_USER: ${DB_USER}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME}
      DB_PASSWORD: ${DB_PASSWORD}
    expose:
      - "3000"
    depends_on:
      - database
    networks:
      - internal

  frontend:
    build:
      context: ./Moonlight_Frontend_React
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_USE_MOCK: ${VITE_USE_MOCK}
        VITE_MP_PUBLIC_KEY: ${VITE_MP_PUBLIC_KEY}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  nginx:
    image: nginx:1.31.1-alpine3.23
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - internal

networks:
  internal:
    driver: bridge
  app-network:
